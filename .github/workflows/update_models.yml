name: Update 3D Print Models

on:
  schedule:
    - cron: '0 0,12 * * *'  # Runs twice a day (at 00:00 and 12:00 UTC)
  workflow_dispatch:        # Allows manual triggering from the GitHub Actions UI

jobs:
  update-models:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper script
        run: node fetch_models.js

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models.json models.js
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in models.json or models.js. Skipping commit."
          else
            git commit -m "Auto-update scraped 3D models [skip ci]"
            git push
          fi
